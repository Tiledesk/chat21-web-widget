<div class="lyrics-container">

    <audio
      #audioPlayer
      (timeupdate)="onTimeUpdate()"
      style="display:none">
    </audio>
  
    <p class="lyrics message_innerhtml marked" #transcriptBox [style.color]="color">
      <span
        *ngFor="let w of words; let i = index; trackBy: trackByIndex"
        class="word"
        [ngClass]="w.state">
        {{ w.text }}
      </span>
    </p>
  
</div>
